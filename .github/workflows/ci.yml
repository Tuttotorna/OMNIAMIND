name: OMNIAMIND CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  omniamind-orchestrator:
    name: Test OMNIAMIND Orchestration Auditor
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install package
        run: |
          python -m pip install -e .

      - name: Install test dependencies
        run: |
          python -m pip install pytest

      - name: Run standalone auditor tests
        run: |
          python -m pytest -q tests/test_omniamind_orchestrator.py

      - name: Run OMNIAMIND Orchestration Auditor smoke test
        run: |
          python -m omniamind_orchestrator.cli --input examples/sample_orchestration_trace.jsonl --out-dir ci_report

      - name: Show generated certificate
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          p = Path("ci_report/certificate.json")
          if not p.exists():
              raise SystemExit("Missing ci_report/certificate.json")

          data = json.loads(p.read_text(encoding="utf-8"))
          print(json.dumps(data, indent=2))
          PY
