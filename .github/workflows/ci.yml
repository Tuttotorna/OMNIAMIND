name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test / python-${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest numpy matplotlib jsonschema

      - name: Install current package when package metadata exists
        run: |
          if [ -f pyproject.toml ] || [ -f setup.py ]; then
            python -m pip install -e .
          else
            echo "No Python package metadata found; skipping editable install."
          fi

      - name: Run tests when tests exist
        run: |
          if [ -d tests ]; then
            python -m pytest -q
          else
            echo "No tests directory found; CI passes as documentation-only repository."
          fi
